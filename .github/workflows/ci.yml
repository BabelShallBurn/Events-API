name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    environment: production

    steps:
        - name: Checkout code
          uses: actions/checkout@v4
        
        - name: Set up Docker Buildx
          uses: docker/setup-buildx-action@v3
        
        - name: Build Docker image
          run: | 
            docker build -t events-api:latest .

        - name: Run Container
          run: |
            docker run -d -p 5001:5001 --name events-api events-api:latest
            for i in {1..20}; do
              if curl -fsS http://localhost:5001/api/health; then
                echo "API is up!"
                exit 0
              fi
              echo "Waiting for API to be up...($i)"
              sleep 5
            done

            echo "API did not start in time."
            docker logs events-api-container || true
            exit 1
        
        - name: Setup Python
          uses: actions/setup-python@v5
          with:
            python-version: '3.14'
        
        - name: Install dependencies
          run: |
            pip install -r requirements.txt
        
        - name: Install test dependencies
          run: |
            pip install -r requirements-test.txt
        
        - name: run tests
          run: |
            pytest -v

        - name: Stop and remove container
          if: always()
          run: |
            docker stop events-api || true
            docker rm events-api || true
        
        - name: Login to Docker Hub
          uses: docker/login-action@v2
          with:
            username: ${{ secrets.DOCKERHUB_USERNAME }}
            password: ${{ secrets.DOCKERHUB_TOKEN }}
            
        - name: Tag Docker image
          run: |
            docker tag events-api:latest ${{ secrets.DOCKERHUB_USERNAME }}/events-api:latest
        
        - name: Push Docker image
          run: |
            docker push ${{ secrets.DOCKERHUB_USERNAME }}/events-api:latest
          
        - name: Trigger Render Deploy
          run: |
            curl -X POST ${{ secrets.RENDER_DEPLOY_HOOK }}